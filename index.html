<script>
  let basePeriod = null; 
  let isChecking = false;
  let isPanelVisible = true;

  const introScreen = document.getElementById('hacker-intro');
  const toggleBtn = document.getElementById('panel-toggle-btn');
  const overlayWrapper = document.getElementById('overlay-wrapper');
  const loginSection = document.getElementById('login-section');
  const predSection = document.getElementById('pred-section');
  const pwInput = document.getElementById('pw-input');
  const periodDisplay = document.getElementById('period-display');
  const warningBox = document.getElementById('warning-box');
  const resultContainer = document.getElementById('result-container');
  const predBadge = document.getElementById('pred-badge');
  const predBall = document.getElementById('pred-ball');
  const boxLoader = document.getElementById('box-loader');
  const guessBtn = document.getElementById('guess-btn');
  const termBox = document.getElementById('term-box');

  // Matrix BG Animation Setup
  const canvas = document.getElementById('matrix-bg');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const alphabet = "010101XYZSYSTEMCRACKED777999";
  const rainDrops = Array(Math.floor(canvas.width / 14)).fill(1);

  function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0f6'; ctx.font = '14px monospace';
    for (let i = 0; i < rainDrops.length; i++) {
      const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
      ctx.fillText(text, i * 14, rainDrops[i] * 14);
      if (rainDrops[i] * 14 > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
      rainDrops[i]++;
    }
  }
  const matrixInterval = setInterval(drawMatrix, 30);

  // Terminal Logs Animation Loop
  const logs = [
    "> Connecting proxy nodes...", "> Bypass game hash encryption...",
    "> Fetching active period keys...", "> Overriding anti-cheat blocks...",
    "> Packet injection completed...", "> Target response received [200 OK]..."
  ];
  let logIdx = 0;
  setInterval(() => {
    if(logIdx < logs.length) {
      termBox.innerHTML += logs[logIdx] + "<br>";
      logIdx++;
    }
  }, 1500);

  // Close Intro Page after 10 seconds
  setTimeout(() => {
    clearInterval(matrixInterval);
    introScreen.style.display = 'none';
    overlayWrapper.style.display = 'block';
    toggleBtn.style.display = 'flex';
  }, 10000);

  // Show/Hide Panel Triggered by Button Click
  let isDraggingBtn = false; // Flag to prevent click event while dragging button
  toggleBtn.addEventListener('click', () => {
    if (isDraggingBtn) return; // Prevent clicking while dragging
    if (isPanelVisible) {
      overlayWrapper.style.display = 'none';
      toggleBtn.textContent = "🔓";
    } else {
      overlayWrapper.style.display = 'block';
      toggleBtn.textContent = "☣️";
    }
    isPanelVisible = !isPanelVisible;
  });

  // API Call to fetch the initial sequence start point
  async function fetchCurrentLivePeriod() {
    try {
      const response = await fetch(`https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?ts=${Date.now()}`);
      if (!response.ok) return null;
      const jsonData = await response.json();
      if (jsonData?.data?.list?.length > 0) {
        let rawIssue = jsonData.data.list[0].issueNumber || jsonData.data.list[0].issue;
        return BigInt(rawIssue) + 1n;
      }
      return null;
    } catch (err) { return null; }
  }

  // 🔮 CRACK / GUESS BUTTON TRIGGERS (MANUAL MODE)
  guessBtn.addEventListener('click', async () => {
    if (isChecking) return;
    isChecking = true;
    guessBtn.disabled = true;

    warningBox.style.display = 'none';
    resultContainer.style.display = 'flex';
    boxLoader.style.display = 'flex';

    if (basePeriod === null) {
      let livePeriod = await fetchCurrentLivePeriod();
      basePeriod = livePeriod ? livePeriod : 202600000000n;
    } else {
      basePeriod = basePeriod + 1n;
    }
    
    periodDisplay.textContent = "⏳ PERIOD: " + basePeriod.toString();

    setTimeout(() => {
      const isSmall = Math.random() < 0.5;
      const number = isSmall ? Math.floor(Math.random() * 5) : Math.floor(Math.random() * 5) + 5;
      
      if (isSmall) {
        predBadge.textContent = 'SMALL';
        predBadge.className = 'badge-3d badge-small';
        predBall.className = 'num-3d num-green'; 
      } else {
        predBadge.textContent = 'BIG';
        predBadge.className = 'badge-3d badge-big';
        predBall.className = 'num-3d num-red';
      }
      predBall.textContent = number;

      boxLoader.style.display = 'none';
      isChecking = false;
      guessBtn.disabled = false;
    }, 5000);
  });

  document.getElementById('login-btn').addEventListener('click', () => {
    if (pwInput.value.trim() === "NEO") {
      loginSection.style.display = 'none';
      predSection.style.display = 'flex'; 
    }
  });

  // Neon Dynamic Border Lines Animation
  (function setupNeonCanvas() {
    const wrapper = document.getElementById('overlay-wrapper');
    const neonCanvas = document.getElementById('neon-canvas');
    if (!wrapper || !neonCanvas) return;
    function resizeNeon() {
      const rect = wrapper.getBoundingClientRect();
      neonCanvas.width = rect.width + 12; neonCanvas.height = rect.height + 12;
    }
    resizeNeon(); new ResizeObserver(resizeNeon).observe(wrapper);
    const ctx = neonCanvas.getContext('2d');
    let dashOffset1 = 0;
    function animateNeon() {
      ctx.clearRect(0, 0, neonCanvas.width, neonCanvas.height);
      dashOffset1 = (dashOffset1 + 5) % 1000;
      ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = '#00ffcc';
      ctx.beginPath(); ctx.roundRect(4, 4, neonCanvas.width-8, neonCanvas.height-8, 20);
      ctx.setLineDash([50, 150]); ctx.lineWidth = 3;
      ctx.lineDashOffset = dashOffset1; ctx.strokeStyle = '#00ffcc'; ctx.stroke();
      ctx.restore(); requestAnimationFrame(animateNeon);
    }
    animateNeon();
  })();

  // --------------------------------------------------------------
  //  UNIVERSAL DRAGGABLE LOGIC FOR BOTH PANEL AND BUTTON
  // --------------------------------------------------------------
  function makeElementDraggable(dragTarget, dragHandle, isButton = false) {
    let activeDrag = false;
    let startX = 0, startY = 0, initialLeft = 0, initialTop = 0;

    function startDrag(clientX, clientY) {
      const rect = dragTarget.getBoundingClientRect();
      dragTarget.style.transform = 'none';
      dragTarget.style.animation = 'none'; // Stop floating while dragging panel
      dragTarget.style.left = rect.left + 'px';
      dragTarget.style.top = rect.top + 'px';
      dragTarget.style.right = 'auto'; // Break CSS sticky right rules for button
      
      initialLeft = rect.left;
      initialTop = rect.top;
      startX = clientX;
      startY = clientY;
      activeDrag = true;
      if (isButton) isDraggingBtn = false;
    }

    function moveDrag(clientX, clientY) {
      if (!activeDrag) return;
      if (isButton) isDraggingBtn = true; // Mark as dragging to avoid misclicks

      let deltaX = clientX - startX;
      let deltaY = clientY - startY;

      let newLeft = Math.min(window.innerWidth - dragTarget.offsetWidth, Math.max(0, initialLeft + deltaX));
      let newTop = Math.min(window.innerHeight - dragTarget.offsetHeight, Math.max(0, initialTop + deltaY));

      dragTarget.style.left = newLeft + 'px';
      dragTarget.style.top = newTop + 'px';
    }

    function endDrag() {
      if (!activeDrag) return;
      activeDrag = false;
      if (!isButton) {
        // Resume panel float effect safely after releasing drag
        dragTarget.style.animation = 'floatAir 4s ease-in-out infinite';
      } else {
        // Clear click lock safely for button clicks
        setTimeout(() => { isDraggingBtn = false; }, 50);
      }
    }

    // Mouse listeners
    dragHandle.addEventListener('mousedown', (e) => {
      if (['INPUT', 'BUTTON', 'A', 'CANVAS'].includes(e.target.tagName) && !isButton) return;
      e.preventDefault();
      startDrag(e.clientX, e.clientY);
      
      const onMouseMove = (ev) => moveDrag(ev.clientX, ev.clientY);
      const onMouseUp = () => {
        endDrag();
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
      };
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });

    // Touch listeners
    dragHandle.addEventListener('touchstart', (e) => {
      if (['INPUT', 'BUTTON', 'A'].includes(e.target.tagName) && !isButton) return;
      const touch = e.touches[0];
      startDrag(touch.clientX, touch.clientY);

      const onTouchMove = (ev) => {
        const t = ev.touches[0];
        moveDrag(t.clientX, t.clientY);
      };
      const onTouchEnd = () => {
        endDrag();
        document.removeEventListener('touchmove', onTouchMove);
        document.removeEventListener('touchend', onTouchEnd);
      };
      document.addEventListener('touchmove', onTouchMove, { passive: false });
      document.addEventListener('touchend', onTouchEnd);
    });
  }

  // Execute Drag Assignment rules
  makeElementDraggable(document.getElementById('overlay-wrapper'), document.getElementById('overlay-box'), false);
  makeElementDraggable(toggleBtn, toggleBtn, true);

</script>
