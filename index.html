<script>

  const introScreen = document.getElementById('hacker-intro');

  const guessBtn = document.getElementById('guess-btn');
  const termBox = document.getElementById('term-box');

  // Intro Matrix
  const canvas = document.getElementById('matrix-bg');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const alphabet = "☠️BYPASS0101777HACKERVIPENGINE99PERCENT";
  const rainDrops = Array(Math.floor(canvas.width / 14)).fill(1);

  function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0fcc'; ctx.font = '14px monospace';
    for (let i = 0; i < rainDrops.length; i++) {
      const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
      ctx.fillText(text, i * 14, rainDrops[i] * 14);
      if (rainDrops[i] * 14 > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
      rainDrops[i]++;
    }
  }
  const matrixInterval = setInterval(drawMatrix, 30);

  // 💻 पूरे पैनल के बैकग्राउंड के लिए मैट्रिक्स इंजन
  const pCanvas = document.getElementById('panel-matrix-bg');
  const pCtx = pCanvas.getContext('2d');
  
  function resizePanelCanvas() {
    pCanvas.width = 270; 
    pCanvas.height = document.getElementById('overlay-box').offsetHeight || 340;
  }
  
  const pDrops = Array(Math.floor(270 / 9)).fill(1);
  function drawPanelMatrix() {
    pCtx.fillStyle = 'rgba(3, 1, 9, 0.08)'; 
    pCtx.fillRect(0, 0, pCanvas.width, pCanvas.height);
    pCtx.fillStyle = '#00ff66'; 
    pCtx.font = '9px monospace';
    for (let i = 0; i < pDrops.length; i++) {
      const txt = String.fromCharCode(0x30A0 + Math.random() * 96);
      pCtx.fillText(txt, i * 9, pDrops[i] * 10);
      if (pDrops[i] * 10 > pCanvas.height && Math.random() > 0.96) pDrops[i] = 0;
      pDrops[i]++;
    }
  }
  setInterval(drawPanelMatrix, 45);

  const logs = [
    "> Piercing security shields...",
    "> Injecting mathematical prediction grid...",
    "> Stabilizing live anti-stuck framework...",
    "> Dynamic sync completely operational."
  ];
  let logIdx = 0;
  setInterval(() => {
    if(logIdx < logs.length) {
      termBox.innerHTML += logs[logIdx] + "<br>"; logIdx++;
    }
  }, 1200);

  setTimeout(() => {
    clearInterval(matrixInterval);
    introScreen.style.display = 'none';
    overlayWrapper.style.display = 'block';
    toggleBtn.style.display = 'flex';
    resizePanelCanvas();
  }, 10000);

  let isDraggingBtn = false;
  toggleBtn.addEventListener('click', () => {
    if (isDraggingBtn) return;
    if (isPanelVisible) {
      overlayWrapper.style.display = 'none';
    } else {
      overlayWrapper.style.display = 'block';
      setTimeout(resizePanelCanvas, 50);
    }
    isPanelVisible = !isPanelVisible;
  });

  async function monitorLiveGamePeriod() {
    try {
      const response = await fetch(`https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?ts=${Date.now()}`);
      if (!response.ok) return;
      const jsonData = await response.json();
      if (jsonData?.data?.list?.length > 0) {
        let currentActiveItem = jsonData.data.list[0];
        let rawIssue = currentActiveItem.issueNumber || currentActiveItem.issue;
        
        currentActivePeriod = (BigInt(rawIssue) + 1n).toString();

        if (currentActivePeriod !== lastCalculatedPeriod && isResultDisplayed) {
          guessBtn.disabled = false; 
          guessBtn.textContent = "🔮 GUESS NEXT SIGNAL";
        }

        historyTrendLogs = jsonData.data.list.map(obj => ({
          num: parseInt(obj.colour || obj.number || 0),
          type: (obj.colour || obj.number) >= 5 ? 'BIG' : 'SMALL'
        }));
      }
    } catch (e) {
      const d = new Date();
      const totalPassedMins = Math.floor(((d.getHours() * 3600) + (d.getMinutes() * 60) + d.getSeconds()) / 60);
      currentActivePeriod = d.getFullYear().toString() + (d.getMonth()+1).toString().padStart(2,'0') + d.getDate().toString().padStart(2,'0') + "100" + totalPassedMins;
      
      if (currentActivePeriod !== lastCalculatedPeriod && isResultDisplayed) {
        guessBtn.disabled = false;
        guessBtn.textContent = "🔮 GUESS NEXT SIGNAL";
      }
    }
  }

  function calculate99AccuracySignal(history) {
    if (!history || history.length < 4) {
      return Math.random() > 0.5 ? 'BIG' : 'SMALL';
    }

    let straightRuns = 1;
    let baselineType = history[0].type;
    for (let i = 1; i < history.length; i++) {
      if (history[i].type === baselineType) straightRuns++;
      else break;
    }

    if (straightRuns >= 3) {
      return baselineType;
    }

    let calculatedTrend = Math.random() > 0.5 ? 'BIG' : 'SMALL';
    if (calculatedTrend === lastCalculatedTrend) {
      calculatedTrend = lastCalculatedTrend === 'BIG' ? 'SMALL' : 'BIG';
    }
    
    lastCalculatedTrend = calculatedTrend;
    return calculatedTrend;
  }

  guessBtn.addEventListener('click', async () => {
    if (isChecking) return;
    isChecking = true;
    guessBtn.disabled = true;

    warningBox.style.display = 'none';
    resultContainer.style.display = 'flex';
    boxLoader.style.display = 'flex';
    
    setTimeout(resizePanelCanvas, 30);

    await monitorLiveGamePeriod();
    lastCalculatedPeriod = currentActivePeriod; 
    periodDisplay.textContent = "💸 LOCKED PERIOD: " + lastCalculatedPeriod;

    setTimeout(() => {
      let finalCalculatedPrediction = calculate99AccuracySignal(historyTrendLogs);
      let finalJackpotNum = 5;

      if (finalCalculatedPrediction === 'BIG') {
        const bigSet = [5, 6, 7, 8, 9];
        finalJackpotNum = bigSet[Math.floor(Math.random() * bigSet.length)];
        
        predBadge.textContent = 'BIG';
        predBadge.className = 'text-result-view color-big';
        predBall.style.color = '#11e18d';
      } else {
        const smallSet = [0, 1, 2, 3, 4];
        finalJackpotNum = smallSet[Math.floor(Math.random() * smallSet.length)];

        predBadge.textContent = 'SMALL';
        predBadge.className = 'text-result-view color-small';
        predBall.style.color = '#ff5e62';
      }

      predBall.textContent = finalJackpotNum;
      boxLoader.style.display = 'none'; 
      isChecking = false;
      isResultDisplayed = true;

      guessBtn.textContent = "⏳ WAIT FOR NEXT PERIOD";
      guessBtn.disabled = true;
      setTimeout(resizePanelCanvas, 50);
    }, 5000);
  });

  document.getElementById('login-btn').addEventListener('click', () => {
    if (pwInput.value.trim() === "NEO") {
      loginSection.style.display = 'none';
      predSection.style.display = 'flex';
      monitorLiveGamePeriod();
      setInterval(monitorLiveGamePeriod, 3000);
      setTimeout(resizePanelCanvas, 60);
    }
  });

  // Neon Canvas Border Glow Effect
  (function setupNeonCanvas() {
    const wrapper = document.getElementById('overlay-wrapper');
    const neonCanvas = document.getElementById('neon-canvas');
    if (!wrapper || !neonCanvas) return;
    function resizeNeon() {
      const rect = wrapper.getBoundingClientRect();
      neonCanvas.width = rect.width + 12; neonCanvas.height = rect.height + 12;
    }
    resizeNeon(); new ResizeObserver(resizeNeon).observe(wrapper);
    const ctx = neonCanvas.getContext('2d');
    let dashOffset1 = 0;
    function animateNeon() {
      ctx.clearRect(0, 0, neonCanvas.width, neonCanvas.height);
      dashOffset1 = (dashOffset1 + 5) % 1000;
      ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = '#00ffcc';
      ctx.beginPath(); ctx.roundRect(4, 4, neonCanvas.width-8, neonCanvas.height-8, 20);
      ctx.setLineDash([50, 150]); ctx.lineWidth = 3;
      ctx.lineDashOffset = dashOffset1; ctx.strokeStyle = '#00ffcc'; ctx.stroke();
      ctx.restore(); requestAnimationFrame(animateNeon);
    }
    animateNeon();
  })();

  // Element Drag Mechanics Engine
  function makeElementDraggable(dragTarget, dragHandle, isButton = false) {
    let activeDrag = false;
    let startX = 0, startY = 0, initialLeft = 0, initialTop = 0;

    function startDrag(clientX, clientY) {
      const rect = dragTarget.getBoundingClientRect();
      dragTarget.style.transform = 'none';
      dragTarget.style.animation = 'none';
      dragTarget.style.left = rect.left + 'px';
      dragTarget.style.top = rect.top + 'px';
      dragTarget.style.right = 'auto';
      
      initialLeft = rect.left;
      initialTop = rect.top;
      startX = clientX;
      startY = clientY;
      activeDrag = true;
      if (isButton) isDraggingBtn = false;
    }

    function moveDrag(clientX, clientY) {
      if (!activeDrag) return;
      if (isButton) isDraggingBtn = true;
      let deltaX = clientX - startX;
      let deltaY = clientY - startY;
      let newLeft = Math.min(window.innerWidth - dragTarget.offsetWidth, Math.max(0, initialLeft + deltaX));
      let newTop = Math.min(window.innerHeight - dragTarget.offsetHeight, Math.max(0, initialTop + deltaY));
      dragTarget.style.left = newLeft + 'px';
      dragTarget.style.top = newTop + 'px';
    }

    function endDrag() {
      if (!activeDrag) return;
      activeDrag = false;
      if (!isButton) {
        dragTarget.style.animation = 'floatAir 4s ease-in-out infinite';
      } else {
        setTimeout(() => { isDraggingBtn = false; }, 50);
      }
    }

    dragHandle.addEventListener('mousedown', (e) => {
      if (['INPUT', 'BUTTON', 'A', 'CANVAS'].includes(e.target.tagName) && !isButton) return;
      e.preventDefault(); startDrag(e.clientX, e.clientY);
      const onMouseMove = (ev) => moveDrag(ev.clientX, ev.clientY);
      const onMouseUp = () => { endDrag(); document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); };
      document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp);
    });

    dragHandle.addEventListener('touchstart', (e) => {
      if (['INPUT', 'BUTTON', 'A'].includes(e.target.tagName) && !isButton) return;
      const touch = e.touches[0]; startDrag(touch.clientX, touch.clientY);
      const onTouchMove = (ev) => moveDrag(ev.touches[0].clientX, ev.touches[0].clientY);
      const onTouchEnd = () => { endDrag(); document.removeEventListener('touchmove', onTouchMove); document.removeEventListener('touchend', onTouchEnd); };
      document.addEventListener('touchmove', onTouchMove, { passive: false }); document.addEventListener('touchend', onTouchEnd);
    });
  }

  makeElementDraggable(document.getElementById('overlay-wrapper'), document.getElementById('overlay-box'), false);
  makeElementDraggable(toggleBtn, toggleBtn, true);
</script>
</body>
</html>
