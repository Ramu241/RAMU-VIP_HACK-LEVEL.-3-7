    const frontCodingInterval = setInterval(() => {
      fCtx.fillStyle = 'rgba(0, 0, 0, 0.1)'; fCtx.fillRect(0, 0, frontCanvas.width, frontCanvas.height);
      for (let i = 0; i < fDrops.length; i++) {
        const char = frontChars[Math.floor(Math.random() * frontChars.length)];
        if(Math.random() > 0.85) { fCtx.fillStyle = '#ff0033'; fCtx.font = 'bold 11px monospace'; }
        else { fCtx.fillStyle = '#00ff66'; fCtx.font = '10px monospace'; }
        fCtx.fillText(char, i * 6, fDrops[i] * 10);
        if (fDrops[i] * 10 > frontCanvas.height && Math.random() > 0.94) fDrops[i] = 0;
        fDrops[i]++;
      }
    }, 30);

    // 3 सेकंड बाद सर्वर फेच ड्रामा चेंज
    setTimeout(() => {
      loaderTitle.textContent = "🛰️ FETCHING JACKPOT DATA...";
      loaderTitle.style.color = "#00ffcc";
      loaderSub.textContent = "DECODING LIVE RESULT STREAM";
    }, 3000);

    // पूरे 6 सेकंड (6000ms) की खतरनाक लोडिंग के बाद फाइनल रिजल्ट
    setTimeout(() => {
      clearInterval(frontCodingInterval); 
      fCtx.clearRect(0, 0, frontCanvas.width, frontCanvas.height); 

      let prediction = masterPatternPredictor(historyTrendLogs, lastCalculatedPeriod);
      let n = prediction.num;

      // 🎨 आपके नंबर के अनुसार उसका परफेक्ट कलर मैचिंग क्लास असाइन करना
      if (prediction.type === 'BIG') {
        if (n === 7 || n === 9) {
          predBadge.textContent = 'BIG • GREEN';
          predBadge.className = 'text-result-view color-big-green';
          predBall.style.color = '#11e18d';
        } else if (n === 6 || n === 8) {
          predBadge.textContent = 'BIG • RED';
          predBadge.className = 'text-result-view color-big-red';
          predBall.style.color = '#ff3b30';
        } else { // 5 नंबर आने पर वॉयलेट मिक्स
          predBadge.textContent = 'BIG • VIOLET';
          predBadge.className = 'text-result-view color-violet-mix';
          predBall.style.color = '#b821ff';
        }
      } else {
        if (n === 1 || n === 3) {
          predBadge.textContent = 'SMALL • GREEN';
          predBadge.className = 'text-result-view color-small-green';
          predBall.style.color = '#11e18d';
        } else if (n === 2 || n === 4) {
          predBadge.textContent = 'SMALL • RED';
          predBadge.className = 'text-result-view color-small-red';
          predBall.style.color = '#ff3b30';
        } else { // 0 नंबर आने पर वॉयलेट मिक्स
          predBadge.textContent = 'SMALL • VIOLET';
          predBadge.className = 'text-result-view color-violet-mix';
          predBall.style.color = '#b821ff';
        }
      }

      predBall.textContent = n;
      boxLoader.style.display = 'none'; 
      isChecking = false;
      isResultDisplayed = true;

      // टेक्स्ट रीसेट मूल स्थिति में
      loaderTitle.textContent = "☠️ BREACHING SERVER...";
      loaderTitle.style.color = "#ff0055";

      guessBtn.textContent = "⏳ WAIT FOR NEXT PERIOD";
      guessBtn.disabled = true;
      setTimeout(resizePanelCanvas, 50);
    }, 6000); 
  });

  document.getElementById('login-btn').addEventListener('click', () => {
    if (pwInput.value.trim() === "NEO") {
      loginSection.style.display = 'none';
      predSection.style.display = 'flex';
      monitorLiveGamePeriod();
      setInterval(monitorLiveGamePeriod, 3000);
      setTimeout(resizePanelCanvas, 60);
    }
  });

  // Neon Border Animation
  (function setupNeonCanvas() {
    const wrapper = document.getElementById('overlay-wrapper');
    const neonCanvas = document.getElementById('neon-canvas');
    if (!wrapper || !neonCanvas) return;
    function resizeNeon() { const rect = wrapper.getBoundingClientRect(); neonCanvas.width = rect.width + 10; neonCanvas.height = rect.height + 10; }
    resizeNeon(); new ResizeObserver(resizeNeon).observe(wrapper);
    const ctx = neonCanvas.getContext('2d');
    let dashOffset1 = 0;
    function animateNeon() {
      ctx.clearRect(0, 0, neonCanvas.width, neonCanvas.height);
      dashOffset1 = (dashOffset1 + 5) % 1000;
      ctx.save(); ctx.shadowBlur = 8; ctx.shadowColor = '#00ffcc';
      ctx.beginPath(); ctx.roundRect(4, 4, neonCanvas.width-8, neonCanvas.height-8, 15);
      ctx.setLineDash([40, 120]); ctx.lineWidth = 2.5; ctx.lineDashOffset = dashOffset1; ctx.strokeStyle = '#00ffcc'; ctx.stroke();
      ctx.restore(); requestAnimationFrame(animateNeon);
    }
    animateNeon();
  })();

  // Drag Engine
  function makeElementDraggable(dragTarget, dragHandle, isButton = false) {
    let activeDrag = false;
    let startX = 0, startY = 0, initialLeft = 0, initialTop = 0;

    function startDrag(clientX, clientY) {
      const rect = dragTarget.getBoundingClientRect();
      dragTarget.style.transform = 'none'; dragTarget.style.animation = 'none';
      dragTarget.style.left = rect.left + 'px'; dragTarget.style.top = rect.top + 'px'; dragTarget.style.right = 'auto';
      initialLeft = rect.left; initialTop = rect.top; startX = clientX; startY = clientY; activeDrag = true;
      if (isButton) isDraggingBtn = false;
    }

    function moveDrag(clientX, clientY) {
      if (!activeDrag) return;
      if (isButton) isDraggingBtn = true;
      let deltaX = clientX - startX; let deltaY = clientY - startY;
      let newLeft = Math.min(window.innerWidth - dragTarget.offsetWidth, Math.max(0, initialLeft + deltaX));
      let newTop = Math.min(window.innerHeight - dragTarget.offsetHeight, Math.max(0, initialTop + deltaY));
      dragTarget.style.left = newLeft + 'px'; dragTarget.style.top = newTop + 'px';
    }

    function endDrag() {
      if (!activeDrag) return;
      activeDrag = false;
      if (!isButton) dragTarget.style.animation = 'floatAir 4s ease-in-out infinite';
      else setTimeout(() => { isDraggingBtn = false; }, 50);
    }

    dragHandle.addEventListener('mousedown', (e) => {
      if (['INPUT', 'BUTTON', 'A', 'CANVAS'].includes(e.target.tagName) && !isButton) return;
      e.preventDefault(); startDrag(e.clientX, e.clientY);
      const onMouseMove = (ev) => moveDrag(ev.clientX, ev.clientY);
      const onMouseUp = () => { endDrag(); document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); };
      document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp);
    });

    dragHandle.addEventListener('touchstart', (e) => {
      if (['INPUT', 'BUTTON', 'A'].includes(e.target.tagName) && !isButton) return;
      const touch = e.touches[0]; startDrag(touch.clientX, touch.clientY);
      const onTouchMove = (ev) => moveDrag(ev.touches[0].clientX, ev.touches[0].clientY);
      const onTouchEnd = () => { endDrag(); document.removeEventListener('touchmove', onTouchMove); document.removeEventListener('touchend', onTouchEnd); };
      document.addEventListener('touchmove', onTouchMove, { passive: false }); document.addEventListener('touchend', onTouchEnd);
    });
  }

  makeElementDraggable(document.getElementById('overlay-wrapper'), document.getElementById('overlay-box'), false);
  makeElementDraggable(toggleBtn, toggleBtn, true);
</script>
