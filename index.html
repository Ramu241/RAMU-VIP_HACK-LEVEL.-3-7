        #mainSizeText { font-size: 24px; font-weight: 900; color: #fff; text-transform: uppercase; font-family: 'Orbitron'; z-index: 6; letter-spacing: 1px; }
        .laser-line { position: absolute; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, #ff0044, #ff0044, transparent); box-shadow: 0 0 12px #ff0044; display: none; z-index: 5; animation: scanMove 1.4s linear infinite; }
        @keyframes scanMove { 0% { top: 0%; } 50% { top: 95%; } 100% { top: 0%; } }

        .panel-footer-info { display: flex; width: 100%; gap: 6px; }

<script>
    const SECRET_KEY = "1234";
    let isUnlocked = false, panelVisible = false, currentMode = "30S", isScanning = false;

    const API_30S = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";
    const API_1M = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";

    // 🎯 DEVID PRIME FIXED PREDICTION MAP INTELLIGENCE
    const PREDICTION_MAP = {
        '0': { result: 'SMALL', numbers: [4, 2] },
        '1': { result: 'BIG', numbers: [6, 8] },
        '2': { result: 'SMALL', numbers: [1, 3] },

        '8': { result: 'BIG', numbers: [9, 5] },
        '9': { result: 'SMALL', numbers: [1, 3] }
    };

    let engine = {
        "30S": { lastPeriod: "", predictedPeriod: "---", currentPredText: "WAIT", nextPredTemp: "WAIT", predSizeOnly: "", predNums: [], wins: 0, losses: 0, totalBets: 0, logs: [], lastProcessedPeriod: "" },
        "1M":  { lastPeriod: "", predictedPeriod: "---", currentPredText: "WAIT", nextPredTemp: "WAIT", predSizeOnly: "", predNums: [], wins: 0, losses: 0, totalBets: 0, logs: [], lastProcessedPeriod: "" }
    };

    function openTelegram() { window.open("https://t.me/+zDMG6OFhIyExYzI9", "_blank"); }

    function runLoading() {

        let progress = 0;

    }

    function handlePanelClick(e) {
        e.stopPropagation();
        if (!isUnlocked) { document.getElementById("cryptoAuthModal").classList.add("visible"); } 
        else { panelVisible = !panelVisible; document.getElementById("blazePred").style.display = panelVisible ? "flex" : "none"; document.getElementById("btnPanel").style.borderColor = panelVisible ? "var(--theme-green)" : "var(--theme-red)"; }
    }

    function verifyAccess() {
        if (document.getElementById("passkeyField").value === SECRET_KEY) {
            const verifyScreen = document.getElementById("coreVerifyScreen");
            verifyScreen.style.display = "flex";
            let loadProgress = 0;
            let verifyInterval = setInterval(() => { loadProgress += 20; document.getElementById("verifyStatusText").innerText = `SYNCING CHANNELS (${loadProgress}%)`; if(loadProgress >= 100) { clearInterval(verifyInterval); document.getElementById("cryptoAuthModal").classList.remove("visible"); isUnlocked = true; panelVisible = true; document.getElementById("blazePred").style.display = "flex"; document.getElementById("btnPanel").style.borderColor = "var(--theme-green)"; startGlobalEngine(); } }, 1000);
        } else { alert("❌ INVALID ACCESS KEY!"); }
    }

    function setMode(mode) {
        if (currentMode === mode || isScanning) return;
        currentMode = mode;
        document.getElementById("m30s").classList.toggle("active", mode === "30S");
        document.getElementById("m1m").classList.toggle("active", mode === "1M");
        renderUi();
    }

    function startGlobalEngine() {
        setInterval(() => {
            let now = new Date();
            let sec = now.getUTCSeconds();
            let rem30s = 30 - (sec % 30);
            let rem1m = 60 - sec;

            if (rem30s === 30) fetchNetworkData("30S", API_30S);
            if (rem1m === 60) fetchNetworkData("1M", API_1M);

            let activeRem = (currentMode === "30S") ? rem30s : rem1m;
            document.getElementById("remTimeBox").textContent = "00:" + (activeRem < 10 ? "0" + activeRem : activeRem);
        }, 1000);
        setInterval(() => { fetchNetworkData("30S", API_30S); fetchNetworkData("1M", API_1M); }, 2000);
    }

    async function fetchNetworkData(mode, api) {
        try {
            const resp = await fetch(api + "?t=" + Date.now());
            const json = await resp.json();
            if (json && json.data && json.data.list.length > 0) {
                const node = json.data.list[0];
                const serverPeriod = node.issueNumber.toString();
                const num = parseInt(node.number);
                let mData = engine[mode];

                if (serverPeriod !== mData.lastPeriod) {
                    if (mData.predictedPeriod === serverPeriod && mData.currentPredText !== "WAIT" && mData.currentPredText !== "WAITING FOR ENGINE") {
                        processStrictResult(mode, serverPeriod, num);
                    }
                    
                    mData.predictedPeriod = (BigInt(serverPeriod) + 1n).toString();
                    calculateDevidPrimePatterns(mode, serverPeriod, json.data.list);
                    mData.lastPeriod = serverPeriod;

                    if (currentMode === mode) triggerLaserScan();
                    else mData.currentPredText = mData.nextPredTemp;
                }
            }
        } catch (e) {}
    }

    function triggerLaserScan() {
        isScanning = true;
        const laser = document.getElementById("laserScanner");
        const displayBoxText = document.getElementById("mainSizeText");
        laser.style.display = "block";
        displayBoxText.innerText = "SCANNING CURRENT PATTERN...";
        displayBoxText.style.color = "var(--theme-glow)";

        setTimeout(() => {
            laser.style.display = "none";
            isScanning = false;
            let mData = engine[currentMode];
            mData.currentPredText = mData.nextPredTemp;
            renderUi();
        }, 4500);
    }

    // 🧠 DEVID PRIME INTEGRATED PREDICTION MECHANISM
    function calculateDevidPrimePatterns(mode, periodString, list) {
        let mData = engine[mode];
        
        let arr = list.map(x => {
            let n = parseInt(x.number);
            return { num: n, size: n >= 5 ? "BIG" : "SMALL" };
        });

        // STREAK COUNTER
        let streak = 1;
        for (let i = 1; i < arr.length; i++) {
            if (arr[i].size == arr[0].size) streak++;
            else break;
        }

        let big = 0, small = 0;
        for (let i = 0; i < 8; i++) {
            if (arr[i].size == "BIG") big++;
            else small++;
        }

        let signal = "BIG";
        let logicMode = "BALANCE";

        if (streak >= 4) {
            signal = (arr[0].size == "BIG") ? "SMALL" : "BIG";
            logicMode = "4 BREAK FORCE";
        } else if (arr[0].size != arr[1].size && arr[1].size != arr[2].size && arr[2].size != arr[3].size) {
            signal = (arr[0].size == "BIG") ? "SMALL" : "BIG";
            logicMode = "ZIGZAG";
        } else if (streak == 3) {
            signal = arr[0].size;
            logicMode = "TREND FOLLOW";
        } else if (mData.losses >= 2 || Math.random() > 0.78) {
            let key = String(arr[0].num);
            signal = PREDICTION_MAP[key].result;
            logicMode = "MAP SWITCH";
        } else {
            signal = big > small ? "SMALL" : "BIG";
        }

        let nums = [];
        if (logicMode == "MAP SWITCH") {
            let key = String(arr[0].num);
            nums = PREDICTION_MAP[key].numbers;
        } else {
            let pool = (signal == "BIG") ? [5, 6, 7, 8, 9] : [0, 1, 2, 3, 4];
            let used = arr.slice(0, 6).map(x => x.num);
            let fresh = pool.filter(n => !used.includes(n));

            if (fresh.length >= 2) {
                nums = [
                    fresh[Math.floor(Math.random() * fresh.length)],
                    fresh[Math.floor(Math.random() * fresh.length)]
                ];
            } else {
                nums = [
                    pool[Math.floor(Math.random() * pool.length)],
                    pool[Math.floor(Math.random() * pool.length)]
                ];
            }
            if (nums[0] == nums[1]) {
                nums[1] = pool[(pool.indexOf(nums[0]) + 1) % pool.length];
            }
        }

        mData.predSizeOnly = signal;
        mData.predNums = nums;
        mData.nextPredTemp = `${signal} (${nums[0]},${nums[1]})`;
    }

    // 🎯 असली रिजल्ट एक्सट्रैक्टर (WIN / LOSS / JACKPOT) रो लॉजिक
    function processStrictResult(mode, period, num) {
        let mData = engine[mode];
        
        if (mData.lastProcessedPeriod === period) return;

        let actSize = num >= 5 ? "BIG" : "SMALL";
        let isSideWin = (mData.predSizeOnly === actSize);
        let jackpot = mData.predNums.includes(num);
        let finalWin = isSideWin || jackpot;

        let txt = "LOSS";
        let cls = "loss";

        if (jackpot) {
            txt = "JACKPOT";
            cls = "jackpot-glow";
            mData.wins++;
        } else if (isSideWin) {
            txt = "WIN";
            cls = "win";
            mData.wins++;
        } else {
            mData.losses++;
        }
        
        mData.totalBets++;
        mData.lastProcessedPeriod = period;

        // आपके कोड की तरह रो डेटा को प्रीपेंड (सबसे ऊपर) करता है
        mData.logs.unshift({
            period: period.slice(-4),
            pred: `${mData.predSizeOnly} [${mData.predNums.join(",")}]`,
            actualResult: `${actSize} (${num})`,
            statusText: txt,
            statusClass: cls
        });
    }

    function renderUi() {
        let mData = engine[currentMode];
        document.getElementById("scoreTotal").innerText = mData.totalBets;
        document.getElementById("scoreWins").innerText = mData.wins;
        document.getElementById("scoreLoss").innerText = mData.losses;
        
        let rate = mData.totalBets > 0 ? Math.floor((mData.wins / mData.totalBets) * 100) : 0;
        document.getElementById("scoreRate").innerText = rate + "%";
        
        document.getElementById("tgtPeriod").innerText = mData.predictedPeriod.slice(-4);

        if (!isScanning) {
            const textEl = document.getElementById("mainSizeText");
            textEl.innerText = mData.currentPredText;
            if (mData.currentPredText.includes("BIG")) textEl.style.color = "var(--theme-green)";
            else if (mData.currentPredText.includes("SMALL")) textEl.style.color = "var(--theme-red)";
            else textEl.style.color = "#fff";
        }

        const tbody = document.getElementById("logs"); tbody.innerHTML = "";
        mData.logs.forEach(l => {
            tbody.innerHTML += `<tr>
                <td style='color:var(--theme-glow); font-family:Orbitron;'>${l.period}</td>
                <td style='color:#bbb; font-family:Orbitron;'>${l.pred}</td>
                <td style='color:var(--theme-gold); font-family:Orbitron; font-weight:800;'>${l.actualResult}</td>
                <td><span class='${l.statusClass}'>${l.statusText}</span></td>
            </tr>`;
        });
    }

    function makeDraggable(el) {
        let active = false, xOff = 0, yOff = 0, startX, startY;
        el.addEventListener("touchstart", (e) => {
            if (e.target.closest('.mode-selector') || e.target.closest('.history-section') || e.target.closest('.live-score-counter')) return;
            active = true; startX = e.touches[0].clientX - xOff; startY = e.touches[0].clientY - yOff;
        });
        document.addEventListener("touchmove", (e) => {
            if (!active) return; xOff = e.touches[0].clientX - startX; yOff = e.touches[0].clientY - startY;
            el.style.transform = `translate3d(calc(-50% + ${xOff}px), calc(-50% + ${yOff}px), 0)`;
        });
        document.addEventListener("touchend", () => active = false);
    }

    window.onload = () => { runLoading(); makeDraggable(document.getElementById("blazePred")); };
</script>
</body>
</html>
